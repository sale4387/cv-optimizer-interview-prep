services:
  cv-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cv-optimizer-app
    env_file:
      - .env
    environment:
      FIREBASE_CREDENTIALS_PATH: /run/secrets/firebase-service-account.json
    volumes:
      - type: bind
        source: ./secrets/firebase-service-account.json
        target: /run/secrets/firebase-service-account.json
        read_only: true
        bind:
          create_host_path: false
    expose:
      - "8501"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health', timeout=5)"
      interval: 15s
      timeout: 6s
      retries: 5
      start_period: 20s

  cv-proxy:
    image: nginx:stable-alpine
    container_name: cv-optimizer-proxy
    depends_on:
      cv-app:
        condition: service_healthy
    ports:
      - "${CV_APP_PORT}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
